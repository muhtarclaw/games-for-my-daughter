<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games for My Daughter 👶</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #fff;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 8px; font-size: 2.2em; }
    .subtitle { text-align: center; color: #888; margin-bottom: 15px; }
    .controls { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; margin-bottom: 30px; position: sticky; top: 20px; z-index: 100; padding: 15px; background: linear-gradient(135deg, rgba(26,26,46,0.95) 0%, rgba(22,33,62,0.95) 100%); border-radius: 12px; }
    .controls select {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 0.95em;
      cursor: pointer;
      outline: none;
    }
    .controls select option { background: #1a1a2e; color: #fff; }
    .loading { text-align: center; color: #666; margin-top: 60px; font-size: 1.1em; }

    .category-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 40px;
    }
    .cat-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 8px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.95em;
      transition: all 0.3s;
    }
    .cat-btn:hover, .cat-btn.active { background: rgba(255,255,255,0.2); }
    .cat-btn.active { background: #e63946; border-color: #e63946; }

    .activity-card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 30px;
      border-left: 4px solid #e63946;
    }
    .activity-card:hover { background: rgba(255,255,255,0.12); }
    .card-inner { display: flex; flex-wrap: wrap; }
    .card-images {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px;
      flex: 0 0 320px;
    }
    .card-images img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }
    .card-images img.small { height: 130px; }
    .card-content { padding: 20px; flex: 1; min-width: 280px; }
    .activity-title { font-size: 1.3em; font-weight: 700; margin-bottom: 8px; color: #fff; }
    .activity-desc { color: #ccc; line-height: 1.6; margin-bottom: 12px; }
    .activity-tip {
      background: rgba(78, 205, 196, 0.15);
      border-left: 3px solid #4ecdc4;
      padding: 10px 15px;
      border-radius: 0 8px 8px 0;
      color: #4ecdc4;
      font-size: 0.9em;
    }
    .activity-age { color: #e63946; font-size: 0.85em; margin-bottom: 5px; font-weight: 600; }
    .category-tag {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75em;
      margin-bottom: 10px;
      color: #aaa;
    }
    .activity-card.hidden { display: none; }
    .section-header {
      color: #888;
      margin: 35px 0 15px;
      font-size: 1em;
      font-weight: normal;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .section-header span { color: #e63946; }
    footer { text-align: center; margin-top: 40px; color: #666; font-size: 0.9em; }
    a { color: #e63946; }
    .admin-link { display: inline-block; margin-top: 15px; color: #444; font-size: 0.85em; }
    .admin-link:hover { color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="site-title">👶 Games for My Daughter</h1>
    <p class="subtitle" id="site-subtitle">Fun & developmental activities for babies 6–12 months</p>
    <div class="controls">
      <select id="lang-select" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="tr">Türkçe</option>
      </select>
      <select id="month-select" onchange="changeMonth(this.value)">
        <option value="0">0 months</option>
        <option value="2">2 months</option>
        <option value="3">3 months</option>
        <option value="6">6 months</option>
        <option value="7">7 months</option>
        <option value="8">8 months</option>
        <option value="9">9 months</option>
      </select>
    </div>

    <div id="loading" class="loading">Loading activities...</div>
    <div id="category-nav" class="category-nav" style="display:none"></div>
    <div id="activity-list" style="display:none"></div>

    <footer>
      <span id="footer-content">Made with ❤️ for my daughter · Images via <a href="https://unsplash.com">Unsplash</a></span><br>
      <a href="admin.html" class="admin-link" id="admin-link">✏️ Admin Panel</a>
    </footer>
  </div>

  <script>
    (function() {
      const stored = localStorage.getItem('lang');
      if (stored) document.documentElement.lang = stored;
    })();
  </script>
  <script>
    let allActivities = [];
    let currentLang = document.documentElement.lang || 'en';
    let currentMonth = 6;
    let filterCat = null;

    const ui = {
      en: {
        title: '👶 Games for My Daughter',
        subtitle: 'Fun & developmental activities for babies 6–12 months',
        loading: 'Loading activities...',
        sectionCurrent: 'This month',
        sectionNext: 'Coming up',
        sectionOthers: 'Earlier activities',
        cats: [
          { key: 'all', label: 'All' },
          { key: 'motor', label: 'Motor Skills' },
          { key: 'sensory', label: 'Sensory Play' },
          { key: 'language', label: 'Language & Social' },
          { key: 'independent', label: 'Independent Play' }
        ],
        footer: 'Made with ❤️ for my daughter · Images via <a href="https://unsplash.com">Unsplash</a>',
        adminLink: '✏️ Admin Panel'
      },
      tr: {
        title: '👶 Kızım İçin Oyunlar',
        subtitle: '6-12 aylık bebekler için eğlenceli ve geliştirici aktiviteler',
        loading: 'Aktiviteler yükleniyor...',
        sectionCurrent: 'Bu ay',
        sectionNext: 'Yaklaşan',
        sectionOthers: 'Önceki aktiviteler',
        cats: [
          { key: 'all', label: 'Tümü' },
          { key: 'motor', label: 'Motor Beceriler' },
          { key: 'sensory', label: 'Duyusal Oyun' },
          { key: 'language', label: 'Dil & Sosyal' },
          { key: 'independent', label: 'Bağımsız Oyun' }
        ],
        footer: 'Kızım için ❤️ ile yapıldı · Görseller: <a href="https://unsplash.com">Unsplash</a>',
        adminLink: '✏️ Yönetici Paneli',
        activities: {
          'tummy-time': { title: '🕯️ Yüzükoyun Zamanı', description: 'Bebeğinizi yumuşak bir zemin üzerine yüzükoyun yerleştirin. Birkaç dakikadan başlayın ve güçlendikçe süreyi artırın. Bebeğinizle konuşarak ve onu meşgul ederek yakınında kalın. Yüzükoyun zamanı, bebeğinizin sürünme ve oturma için ihtiyaç duyduğu boyun ve üst vücut gücünü geliştirir.', tip: '💡 Bez değişiminden sonra yüzükoyun zamanı deneyin veya destek için göğsünün altına küçük bir havlu rulosu koyun.', age: '0+ ay', categoryLabel: 'Motor Beceriler' },
          'all-smiles': { title: '😊 Tüm Gülerler', description: 'Bebeğinize gülümseyin ve gülümsemesini bekleyin! Komik yüzler ve aptal sesler yaparak gülümsemesini alın. Bu basit karşılıklı etkileşim sosyal becerileri ve erken iletişimi geliştirir.', tip: '💡 Yüz yüze ve yakın olun — bebekler ifadelerinizi yakından incelemeyi sever!', age: '2+ ay', categoryLabel: 'Dil & Sosyal' },
          'show-and-tell': { title: '🧸 Göster ve Anlat', description: 'Yumuşak bir oyuncak veya güvenli ev eşyası seçin — temiz bir tahta kaşık, dokulu bir top, bir kumaş parçası. Yakına tutun ve yavaşça tarif edin. Bebeğinizin görmesine, dokunmasına ve keşfetmesine izin verin.', tip: '💡 Farklı dokuları ve şekilleri her gün değiştirin.', age: '0+ ay', categoryLabel: 'Duyusal Oyun' },
          'clappity-clap': { title: '👏 Alkış Alkış', description: 'Bebeğinizi kucağınızda dik oturtun veya yumuşak bir zemine yatırın. Ellerini nazikçe bir araya getirip alkış hareketi yaptırın.', tip: '💡 Ayaklarını birbirine vurma veya müziğe eşlik ederek varyasyonlar ekleyin!', age: '3+ ay', categoryLabel: 'Motor Beceriler' },
          'pedal-pedal': { title: '🚴 Pedal Pedal', description: 'Bez değişiminden sonra bebeğinizi sırt üstü yatırın. Ayak bileklerini nazikçe tutarak bacaklarını bisiklet hareketiyle hareket ettirin.', tip: '💡 Ardından nazik bir karın ovuşturması ekleyin.', age: '0+ ay', categoryLabel: 'Motor Beceriler' },
          'tickle-me': { title: '😆 Gıdıkla Beni', description: 'Sevilen tekerlemeler söyleyin, her ayak parmağını nazikçe oynatın. Gıdıkla!dan önce bekletin.', tip: '💡 Klasik tekerlemeler beklenti ve kıkırdamaları artırmak için mükemmeldir.', age: '2+ ay', categoryLabel: 'Duyusal Oyun' },
          'shake-and-rattle': { title: '🪘 Sallayalım ve Zırlatalım', description: 'Bebek güvenli bir marakas kullanın. Sesin kaynağına dönmeleri için zaman tanıyın.', tip: '💡 Marakasları birlikte yapın!', age: '3+ ay', categoryLabel: 'Duyusal Oyun' },
          'bubble-blowing': { title: '🫧 Balon Üfleme', description: 'Bebeğinizi güvenli şekilde oturtun. Havaya balon üfleyin ve gözlerinin takip etmesini izleyin.', tip: '💡 Zehirsiz balonlar kullanın!', age: '3+ ay', categoryLabel: 'Duyusal Oyun' },
          'play-ball': { title: '⚽ Top Oyunu', description: "Bebeğinizle yerde yumuşak, hafif bir top karşı karşıya oturun. 'Geliyor!' diyerek yavaşça topu yuvarlayın.", tip: '💡 Hafif köpük top kullanın!', age: '3+ ay', categoryLabel: 'Motor Beceriler' },
          'baby-workout': { title: '🏋️ Bebek Egzersizi', description: 'Bebeğinizi bebek jimnastiğinin altına yatırın. Oyuncakları izleyerek keşfetmesine izin verin.', tip: '💡 Yakınında yatın ve teşvik edin!', age: '0+ ay', categoryLabel: 'Motor Beceriler' },
          'chitchat': { title: '💬 Sohbet', description: 'Bebeğinizle etkileşirken gününüzü anlatın. Seslenmelerini taklit ederek karşılıklı konuşma başlatın.', tip: '💡 Kelime dağarcığı oluşturuyorsunuz.', age: '0+ ay', categoryLabel: 'Dil & Sosyal' },
          'fishing-for-fun': { title: '🎣 Eğlence İçin Balık Avı', description: 'Yumuşak oyuncağı kurdele ile bağlayın ve yüzükoyun zamanında sallayın.', tip: '💡 Kurdayı güvenli yerde saklayın.', age: '3+ ay', categoryLabel: 'Motor Beceriler' },
          'peekaboo': { title: '🪄 Kapak', description: 'Örtünün arkasına saklanın ve Kapak! ile şaşırtın. Nesne sürekliliğini öğretir.', tip: '💡 Farklı sesler kullanın!', age: '6+ ay', categoryLabel: 'Dil & Sosyal' },
          'crawling-course': { title: '🛝 Sürünme Parkuru', description: 'Yastıklar ve minderlerle mini engel parkuru oluşturun. Bebeğinizin tırmanmasına yardımcı olun.', tip: '💡 Hareket etmenin doğru yolu yok!', age: '6+ ay', categoryLabel: 'Motor Beceriler' },
          'puppet-theater': { title: '🎭 Kukla Tiyatrosu', description: 'Basit parmak kuklaları yapın. Karakterlerin konuştuğu kısa gösteriler sahneleyin.', tip: '💡 Bebeğinizin kuklalara uzanmasını teşvik edin.', age: '6+ ay', categoryLabel: 'Dil & Sosyal' },
          'mirroring': { title: '🪞 Aynada İzleme', description: 'Güvenli ayna tutun. Abartılı yüzler yapın ve bebeğinizin taklit etmesini teşvik edin.', tip: '💡 Aynalar bebekleri büyüler!', age: '6+ ay', categoryLabel: 'Dil & Sosyal' },
          'kickball': { title: '⚽ Tekme Topu', description: 'Bebeğinizi oturtun ve yumuşak topa doğru bacaklarını sallayın.', tip: '💡 Gülmek kadar bacak gücü de önemli!', age: '7+ ay', categoryLabel: 'Motor Beceriler' },
          'hide-and-seek': { title: '🔍 Saklambaç', description: 'Sevdiği oyuncağı örtünün altına saklayın ve bulmasını teşvik edin.', tip: '💡 Kısmen saklı nesnelerle başlayın.', age: '9+ ay', categoryLabel: 'Dil & Sosyal' },
          'stacking-towers': { title: '🧱 Kule Dizme', description: 'Plastik bardaklar veya yumuşak bloklar verin. Devirmeyi ve yeniden yapmayı seveceklerdir.', tip: '💡 3-4 parçayla başlayın.', age: '9+ ay', categoryLabel: 'Motor Beceriler' },
          'sing-alongs': { title: '🎵 Şarkı Söyleme', description: "Eylemleri olan tekerlemeleri söyleyin. El hareketleri kullanın ve bebeğinizin dalgalanmasını teşvik edin.", tip: '💡 Tekrar bebeklerin hoşuna gider!', age: '6+ ay', categoryLabel: 'Dil & Sosyal' },
          'simple-sorting': { title: '🔷 Basit Sınıflandırma', description: 'Muffen tepsisi ve farklı nesneler verin. Her parçayı deliğe bırakmayı gösterin.', tip: '💡 2 renkle başlayın.', age: '9+ ay', categoryLabel: 'Bağımsız Oyun' },
          'animal-sounds': { title: '🐾 Hayvan Sesleri', description: 'Hayvan kitaplarını okuyun ve sesleri yapın. Her hayvanı işaret edin.', tip: '💡 Fotoğraflı kitaplar daha ilgi çekici.', age: '8+ ay', categoryLabel: 'Dil & Sosyal' },
          'baby-led-cleanup': { title: '🧹 Bebek Yönetimli Temizlik', description: 'Toplamayı oyuna dönüştürün. Oyuncakları sepete bırakmayı gösterin.', tip: '💡 Fırlatma sepeti kullanın!', age: '9+ ay', categoryLabel: 'Bağımsız Oyun' },
          'highchair-art': { title: '🎨 Yüksek Sandalye Resmi', description: 'Büyük kağıt ve bebek güvenli boyalar kullanın. Kağıdı keşfetmesine izin verin.', tip: '💡 Yemek öncesi zamanlama yapın!', age: '9+ ay', categoryLabel: 'Bağımsız Oyun' },
          'follow-the-leader': { title: '🐒 Lideri Takip Et', description: 'Yere inin ve emekleyin! Komik hareketler yapın ve bebeğinizin taklit etmesini teşvik edin.', tip: '💡 Ne kadar aptalca olursa o kadar iyi!', age: '9+ ay', categoryLabel: 'Motor Beceriler' },
          'treasure-basket': { title: '💎 Hazine Sepeti', description: 'Düşük sepete güvenli ev eşyaları doldurun. Farklı dokuları keşfetmelerine izin verin.', tip: '💡 10-15 nesneyle tutun.', age: '6+ ay', categoryLabel: 'Duyusal Oyun' },
          'picture-books': { title: '📖 Resimli Kitaplar', description: 'Sağlam sayfalı kitaplar seçin. Resimlere işaret ederek hevesle okuyun.', tip: '💡 Siyah-beyaz kitaplar erken dönem için yardımcı.', age: '0+ ay', categoryLabel: 'Dil & Sosyal' },
          'texture-boards': { title: '🖐️ Doku Panosu', description: 'Farklı dokularla pano oluşturun. Bebeğinizin her dokuyu keşfetmesine izin verin.', tip: '💡 Tercihlerini not edin!', age: '6+ ay', categoryLabel: 'Duyusal Oyun' },
          'chunky-puzzles': { title: '🧩 Kalın Yapbozlar', description: 'Büyük tutamaklı yapbozlar verin. Birkaç parça yeterlidir.', tip: '💡 2-3 parçalıkla başlayın.', age: '9+ ay', categoryLabel: 'Bağımsız Oyun' }
        }
      }
    };

    function getBrowserLanguage() {
      const langs = navigator.languages || [navigator.language || 'en'];
      for (const l of langs) {
        const base = l.split('-')[0].toLowerCase();
        if (['en', 'tr'].includes(base)) return base;
      }
      return 'en';
    }

    function getStoredLanguage() {
      return localStorage.getItem('lang') || getBrowserLanguage();
    }

    function getAgeMonth(ageStr) {
      return parseInt(ageStr.split('+')[0].split(' ')[0]);
    }

    function changeLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang;
      applyUI();
      renderCategoryNav();
      render();
    }

    function renderCategoryNav() {
      const t = ui[currentLang] || ui['en'];
      document.getElementById('category-nav').innerHTML = t.cats.map(c =>
        `<button class="cat-btn${c.key==='all'?' active':''}" onclick="filterCategory('${c.key}', this)">${c.label}</button>`
      ).join('');
    }

    function applyUI() {
      const t = ui[currentLang] || ui['en'];
      document.getElementById('site-title').textContent = t.title;
      document.getElementById('site-subtitle').textContent = t.subtitle;
      document.getElementById('loading').textContent = t.loading;
      document.getElementById('footer-content').innerHTML = t.footer + '<br>' + `<a href="admin.html" class="admin-link">${t.adminLink}</a>`;
    }

    async function loadActivities() {
      try {
        const res = await fetch('data.json?t=' + Date.now());
        const data = await res.json();
        allActivities = data.activities;
        currentLang = getStoredLanguage();
        currentMonth = parseInt(localStorage.getItem('month')) || 6;
        document.getElementById('lang-select').value = currentLang;
        document.getElementById('month-select').value = currentMonth;
        applyUI();
        render();
      } catch (e) {
        document.getElementById('loading').textContent = 'Failed to load activities.';
      }
    }

    function changeMonth(m) {
      currentMonth = parseInt(m);
      localStorage.setItem('month', currentMonth);
      render();
    }

    function render() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('category-nav').style.display = 'flex';
      document.getElementById('activity-list').style.display = 'block';

      const t = ui[currentLang] || ui['en'];

      const current = allActivities.filter(a => getAgeMonth(a.age) === currentMonth);
      const next = allActivities.filter(a => getAgeMonth(a.age) > currentMonth);
      const others = allActivities.filter(a => getAgeMonth(a.age) < currentMonth);

      function renderActivity(a) {
        const ta = t.activities && t.activities[a.id];
        const title = ta && ta.title ? ta.title : a.title;
        const desc = ta && ta.description ? ta.description : a.description;
        const tip = ta && ta.tip ? ta.tip : a.tip;
        const age = ta && ta.age ? ta.age : a.age;
        const catLabel = ta && ta.categoryLabel ? ta.categoryLabel : a.categoryLabel;
        const hidden = filterCat && filterCat !== 'all' && a.category !== filterCat;
        return `
          <div class="activity-card${hidden ? ' hidden' : ''}" data-cat="${a.category}">
            <div class="card-inner">
              <div class="card-images">
                ${a.images.map((img, i) =>
                  `<img src="${img}" alt="${esc(title)}" class="${i>0?'small':''}" loading="lazy" onerror="this.style.display='none'">`
                ).join('')}
              </div>
              <div class="card-content">
                <span class="category-tag">${catLabel}</span>
                <div class="activity-title">${title}</div>
                <div class="activity-age">${age}</div>
                <p class="activity-desc">${desc}</p>
                <div class="activity-tip">${tip}</div>
              </div>
            </div>
          </div>
        `;
      }

      function renderSection(label, activities) {
        if (activities.length === 0) return '';
        return `
          <h3 class="section-header">${label} <span>(${activities.length})</span></h3>
          ${activities.map(renderActivity).join('')}
        `;
      }

      document.getElementById('activity-list').innerHTML =
        renderSection(t.sectionCurrent, current) +
        renderSection(t.sectionNext, next) +
        renderSection(t.sectionOthers, others);
    }

    function filterCategory(cat, btn) {
      filterCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.activity-card').forEach(card => {
        card.classList.toggle('hidden', cat !== 'all' && card.dataset.cat !== cat);
      });
    }

    function esc(str) {
      return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadActivities();
  </script>
</body>
</html>
