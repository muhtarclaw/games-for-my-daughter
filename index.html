<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games for My Daughter 👶</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #fff;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 10px; font-size: 2.2em; }
    .subtitle { text-align: center; color: #888; margin-bottom: 20px; }
    .lang-switcher { text-align: center; margin-bottom: 30px; }
    .lang-switcher select {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.9em;
      cursor: pointer;
      outline: none;
    }
    .lang-switcher select option { background: #1a1a2e; color: #fff; }
    .loading { text-align: center; color: #666; margin-top: 60px; font-size: 1.1em; }

    .category-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 40px;
    }
    .cat-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 8px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.95em;
      transition: all 0.3s;
    }
    .cat-btn:hover, .cat-btn.active { background: rgba(255,255,255,0.2); }
    .cat-btn.active { background: #e63946; border-color: #e63946; }

    .activity-card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 30px;
      border-left: 4px solid #e63946;
    }
    .activity-card:hover { background: rgba(255,255,255,0.12); }
    .card-inner { display: flex; flex-wrap: wrap; }
    .card-images {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px;
      flex: 0 0 320px;
    }
    .card-images img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }
    .card-images img.small { height: 130px; }
    .card-content { padding: 20px; flex: 1; min-width: 280px; }
    .activity-title { font-size: 1.3em; font-weight: 700; margin-bottom: 8px; color: #fff; }
    .activity-desc { color: #ccc; line-height: 1.6; margin-bottom: 12px; }
    .activity-tip {
      background: rgba(78, 205, 196, 0.15);
      border-left: 3px solid #4ecdc4;
      padding: 10px 15px;
      border-radius: 0 8px 8px 0;
      color: #4ecdc4;
      font-size: 0.9em;
    }
    .activity-age { color: #e63946; font-size: 0.85em; margin-bottom: 5px; font-weight: 600; }
    .category-tag {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75em;
      margin-bottom: 10px;
      color: #aaa;
    }
    .activity-card.hidden { display: none; }
    footer { text-align: center; margin-top: 40px; color: #666; font-size: 0.9em; }
    a { color: #e63946; }
    .admin-link { display: inline-block; margin-top: 15px; color: #444; font-size: 0.85em; }
    .admin-link:hover { color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="site-title">👶 Games for My Daughter</h1>
    <p class="subtitle" id="site-subtitle">Fun & developmental activities for babies 6–12 months</p>
    <div class="lang-switcher">
      <select id="lang-select" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="tr">Türkçe</option>
      </select>
    </div>

    <div id="loading" class="loading">Loading activities...</div>
    <div id="category-nav" class="category-nav" style="display:none"></div>
    <div id="activity-list" style="display:none"></div>

    <footer>
      <span id="footer-content">Made with ❤️ for my daughter · Images via <a href="https://unsplash.com">Unsplash</a></span><br>
      <a href="admin.html" class="admin-link" id="admin-link">✏️ Admin Panel</a>
    </footer>
  </div>

  <script>
    let allActivities = [];
    let currentLang = 'en';

    const ui = {
      en: {
        title: '👶 Games for My Daughter',
        subtitle: 'Fun & developmental activities for babies 6–12 months',
        loading: 'Loading activities...',
        cats: [
          { key: 'all', label: 'All' },
          { key: 'motor', label: 'Motor Skills' },
          { key: 'sensory', label: 'Sensory Play' },
          { key: 'language', label: 'Language & Social' },
          { key: 'independent', label: 'Independent Play' }
        ],
        footer: 'Made with ❤️ for my daughter · Images via <a href="https://unsplash.com">Unsplash</a>',
        adminLink: '✏️ Admin Panel'
      },
      tr: {
        title: '👶 Kızım İçin Oyunlar',
        subtitle: '6-12 aylık bebekler için eğlenceli ve geliştirici aktiviteler',
        loading: 'Aktiviteler yükleniyor...',
        cats: [
          { key: 'all', label: 'Tümü' },
          { key: 'motor', label: 'Motor Beceriler' },
          { key: 'sensory', label: 'Duyusal Oyun' },
          { key: 'language', label: 'Dil & Sosyal' },
          { key: 'independent', label: 'Bağımsız Oyun' }
        ],
        footer: 'Kızım için ❤️ ile yapıldı · Görseller: <a href="https://unsplash.com">Unsplash</a>',
        adminLink: '✏️ Yönetici Paneli'
      }
    };

    function getBrowserLanguage() {
      const langs = navigator.languages || [navigator.language || 'en'];
      for (const l of langs) {
        const base = l.split('-')[0].toLowerCase();
        if (['en', 'tr'].includes(base)) return base;
      }
      return 'en';
    }

    function getStoredLanguage() {
      return localStorage.getItem('lang') || getBrowserLanguage();
    }

    function changeLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang;
      applyUI();
      renderCategoryNav();
    }

    function renderCategoryNav() {
      const t = ui[currentLang] || ui['en'];
      document.getElementById('category-nav').innerHTML = t.cats.map(c =>
        `<button class="cat-btn${c.key==='all'?' active':''}" onclick="filterCategory('${c.key}', this)">${c.label}</button>`
      ).join('');
    }

    function applyUI() {
      const t = ui[currentLang] || ui['en'];
      document.getElementById('site-title').textContent = t.title;
      document.getElementById('site-subtitle').textContent = t.subtitle;
      document.getElementById('loading').textContent = t.loading;
      document.getElementById('footer-content').innerHTML = t.footer + '<br>' + `<a href="admin.html" class="admin-link">${t.adminLink}</a>`;
    }

    async function loadActivities() {
      try {
        const res = await fetch('data.json?t=' + Date.now());
        const data = await res.json();
        allActivities = data.activities;
        currentLang = getStoredLanguage();
        document.getElementById('lang-select').value = currentLang;
        applyUI();
        render();
      } catch (e) {
        document.getElementById('loading').textContent = 'Failed to load activities.';
      }
    }

    function render() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('category-nav').style.display = 'flex';
      document.getElementById('activity-list').style.display = 'block';

      const t = ui[currentLang] || ui['en'];
      renderCategoryNav();

      document.getElementById('activity-list').innerHTML = allActivities.map(a => `
        <div class="activity-card" data-cat="${a.category}">
          <div class="card-inner">
            <div class="card-images">
              ${a.images.map((img, i) =>
                `<img src="${img}" alt="${esc(a.title)}" class="${i>0?'small':''}" loading="lazy" onerror="this.style.display='none'">`
              ).join('')}
            </div>
            <div class="card-content">
              <span class="category-tag">${a.categoryLabel}</span>
              <div class="activity-title">${a.title}</div>
              <div class="activity-age">${a.age}</div>
              <p class="activity-desc">${a.description}</p>
              <div class="activity-tip">${a.tip}</div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterCategory(cat, btn) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.activity-card').forEach(card => {
        card.classList.toggle('hidden', cat !== 'all' && card.dataset.cat !== cat);
      });
    }

    function esc(str) {
      return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadActivities();
  </script>
</body>
</html>
