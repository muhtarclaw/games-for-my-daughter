      padding: 20px;

      border-radius: 10px;

    .activity-title { font-size: 1.3em; font-weight: 700; margin-bottom: 8px; color: #fff; }
    .activity-desc { color: #ccc; line-height: 1.6; margin-bottom: 12px; }
    .activity-tip {
      background: rgba(78, 205, 196, 0.15);
      border-left: 3px solid #4ecdc4;
      padding: 10px 15px;
      border-radius: 0 8px 8px 0;

            description: 'Sağlam sayfalı, cesur görselleri ve basit hikayeleri olan bebek dostu kitaplar seçin. Bebeğinizi yer süresinde kucağınıza oturtun. Tonunuzu değiştirerek, resimlere işaret ederek ve sorular sorarak hevesle okuyun: \'Bak! Inek ne ses çıkarıyor?\'',
            tip: '💡 Siyah-beyaz veya yüksek kontrastlı kitaplar henüz görme duyularını geliştirmekte olan küçük bebekler için özellikle yardımcıdır. Başlamak için asla erken değil!',
            age: '0+ ay',
            categoryLabel: 'Dil & Sosyal'
          },
          'texture-boards': {
            title: '🖐️ Doku Panosu',
            description: 'Farklı kumaş parçaları, zımpara kağıdı, balonlu poşet, pürüzsüz ahşap ve daha fazlasıyla bir pano oluşturun. Bebeğinizin her dokuyu parmak uçları ve avuçlarıyla keşfetmesine izin verin. Duyusal dünyasını genişletmenin basit, harika bir yolu.',
            tip: '💡 Hangi dokulara en çok uzanırlar not etmek için küçük bir defter kullanın — tercihlerini ortaya koyar!',
            age: '6+ ay',
            categoryLabel: 'Duyusal Oyun'
          },
          'chunky-puzzles': {
            title: '🧩 Kalın Yapbozlar',
            description: 'Kolay tutulabilen büyük tutamaklı yapbozlar küçük eller için mükemmeldir. Çıkıntılı parçalar, henüz kıskaç tutamağı ustalaştırmamış küçük parmaklar için sandığınızdan daha kolaydır. Birkaç parça yeterlidir — resme uydurmak anında gururdur!',
            tip: '💡 Başlamak için 2-3 parçalık yapbozlar seçin. Çok fazla parça hayal kırıklığı, eğlence değil!',
            age: '9+ ay',
            categoryLabel: 'Bağımsız Oyun'
          }
        }
      }
    };

    function getBrowserLanguage() {
      const langs = navigator.languages || [navigator.language || 'en'];
      for (const l of langs) {
        const base = l.split('-')[0].toLowerCase();
        if (['en', 'tr'].includes(base)) return base;
      }
      return 'en';
    }

    function getStoredLanguage() {
      return localStorage.getItem('lang') || getBrowserLanguage();
    }

    function changeLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang;
      applyUI();
      renderCategoryNav();
    }

    function renderCategoryNav() {
      const t = ui[currentLang] || ui['en'];
      document.getElementById('category-nav').innerHTML = t.cats.map(c =>
        `<button class="cat-btn${c.key==='all'?' active':''}" onclick="filterCategory('${c.key}', this)">${c.label}</button>`
      ).join('');
    }

    function applyUI() {
      const t = ui[currentLang] || ui['en'];
      document.getElementById('site-title').textContent = t.title;
      document.getElementById('site-subtitle').textContent = t.subtitle;
      document.getElementById('loading').textContent = t.loading;
      document.getElementById('footer-content').innerHTML = t.footer + '<br>' + `<a href="admin.html" class="admin-link">${t.adminLink}</a>`;
    }

    async function loadActivities() {
      try {
        const res = await fetch('data.json?t=' + Date.now());
        const data = await res.json();
        allActivities = data.activities;
        currentLang = getStoredLanguage();
        document.getElementById('lang-select').value = currentLang;
        applyUI();
        render();
      } catch (e) {
        document.getElementById('loading').textContent = 'Failed to load activities.';
      }
    }

    function render() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('category-nav').style.display = 'flex';
      document.getElementById('activity-list').style.display = 'block';

      const t = ui[currentLang] || ui['en'];
      renderCategoryNav();

      document.getElementById('activity-list').innerHTML = allActivities.map(a => {
        const ta = t.activities && t.activities[a.id];
        const title = ta && ta.title ? ta.title : a.title;
        const desc = ta && ta.description ? ta.description : a.description;
        const tip = ta && ta.tip ? ta.tip : a.tip;
        const age = ta && ta.age ? ta.age : a.age;
        const catLabel = ta && ta.categoryLabel ? ta.categoryLabel : a.categoryLabel;

        return `
        <div class="activity-card" data-cat="${a.category}">
          <div class="card-inner">
            <div class="card-images">
              ${a.images.map((img, i) =>
                `<img src="${img}" alt="${esc(title)}" class="${i>0?'small':''}" loading="lazy" onerror="this.style.display='none'">`
              ).join('')}
            </div>
            <div class="card-content">
              <span class="category-tag">${catLabel}</span>
              <div class="activity-title">${title}</div>
              <div class="activity-age">${age}</div>
              <p class="activity-desc">${desc}</p>
              <div class="activity-tip">${tip}</div>
            </div>
          </div>
        </div>
      `}).join('');
    }

    function filterCategory(cat, btn) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.activity-card').forEach(card => {
        card.classList.toggle('hidden', cat !== 'all' && card.dataset.cat !== cat);
      });
    }

    function esc(str) {
      return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadActivities();
  </script>
</body>
</html>
